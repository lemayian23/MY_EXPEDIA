<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY_EXPEDIA - Flight Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(10px);
        }
        
        .hero {
            padding: 100px 0 60px 0;
            text-align: center;
            color: white;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        
        .flight-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .flight-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .airline-name {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #28a745;
        }
        
        .btn-book {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
        }
        
        .btn-book:hover {
            transform: scale(1.05);
        }
        
        .modal-content {
            border-radius: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#" style="font-size: 1.8rem; font-weight: bold;">
                ✈️ MY_EXPEDIA
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="country.html">Countries</a>
                <a class="nav-link" href="city.html">Cities</a>
                <a class="nav-link" href="#" onclick="viewBookings()">My Bookings</a>
            </div>
        </div>
    </nav>
    
    <div class="hero">
        <div class="container">
            <h1>Your Journey Begins Here</h1>
            <p class="lead">Find and book the best flights at amazing prices</p>
        </div>
    </div>
    
    <div class="container">
        <div class="search-card">
            <form id="searchForm">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">From</label>
                        <select class="form-select" id="origin" required>
                            <option value="">Select origin city</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">To</label>
                        <select class="form-select" id="destination" required>
                            <option value="">Select destination city</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Departure Date</label>
                        <input type="date" class="form-control" id="departureDate" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Passengers</label>
                        <input type="number" class="form-control" id="passengers" min="1" max="9" value="1">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">&nbsp;</label>
                        <button type="submit" class="btn btn-primary w-100" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
                            🔍 Search Flights
                        </button>
                    </div>
                </div>
            </form>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner-border text-light"></div>
            <p class="text-white mt-3">Searching for flights...</p>
        </div>
        
        <div id="results" style="display: none;">
            <h3 class="text-white mb-3">Available Flights</h3>
            <div id="flightResults"></div>
        </div>
    </div>
    
    <!-- Booking Modal -->
    <div class="modal fade" id="bookingModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Complete Your Booking</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookingForm">
                        <input type="hidden" id="selectedFlightId">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="passengerName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="passengerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="passengerPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Passport Number</label>
                            <input type="text" class="form-control" id="passportNo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Seat Preference</label>
                            <select class="form-select" id="seatNumber">
                                <option value="A1">Window (A1)</option>
                                <option value="B1">Middle (B1)</option>
                                <option value="C1">Aisle (C1)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Confirm Booking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentFlights = [];
        
        // Load cities
        async function loadCities() {
            try {
                const response = await fetch('controllers/cityoperations.php?filtercities&countryid=0');
                const cities = await response.json();
                
                const originSelect = document.getElementById('origin');
                const destSelect = document.getElementById('destination');
                
                cities.forEach(city => {
                    originSelect.innerHTML += `<option value="${city.cityid}">${city.cityname}</option>`;
                    destSelect.innerHTML += `<option value="${city.cityid}">${city.cityname}</option>`;
                });
            } catch (error) {
                console.error('Error loading cities:', error);
            }
        }
        
        // Set minimum date
        document.getElementById('departureDate').min = new Date().toISOString().split('T')[0];
        
        // Search flights
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const origin = document.getElementById('origin').value;
            const destination = document.getElementById('destination').value;
            const date = document.getElementById('departureDate').value;
            
            if (origin === destination) {
                alert('Origin and destination cannot be the same!');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            // For now, show mock data since flights table might be empty
            setTimeout(() => {
                const mockFlights = [
                    {
                        FlightID: 1,
                        FlightNumber: 'KQ202',
                        OriginCity: 'Nairobi',
                        DestinationCity: 'Mombasa',
                        DepartureTime: '2024-04-15 08:00:00',
                        ArrivalTime: '2024-04-15 09:30:00',
                        AircraftModel: 'Boeing 737',
                        AvailableSeats: 45,
                        price: 12000
                    },
                    {
                        FlightID: 2,
                        FlightNumber: 'ET308',
                        OriginCity: 'Nairobi',
                        DestinationCity: 'Addis Ababa',
                        DepartureTime: '2024-04-15 10:00:00',
                        ArrivalTime: '2024-04-15 12:00:00',
                        AircraftModel: 'Boeing 787',
                        AvailableSeats: 32,
                        price: 25000
                    }
                ];
                
                displayFlights(mockFlights);
                document.getElementById('loading').style.display = 'none';
            }, 1000);
        });
        
        function displayFlights(flights) {
            const container = document.getElementById('flightResults');
            container.innerHTML = '';
            
            flights.forEach(flight => {
                const departureTime = new Date(flight.DepartureTime).toLocaleTimeString();
                const arrivalTime = new Date(flight.ArrivalTime).toLocaleTimeString();
                
                container.innerHTML += `
                    <div class="flight-card">
                        <div class="row align-items-center">
                            <div class="col-md-5">
                                <div class="airline-name">${flight.FlightNumber}</div>
                                <div>${flight.OriginCity} → ${flight.DestinationCity}</div>
                                <small class="text-muted">${flight.AircraftModel}</small>
                            </div>
                            <div class="col-md-3">
                                <div>🛫 ${departureTime}</div>
                                <div>🛬 ${arrivalTime}</div>
                            </div>
                            <div class="col-md-2">
                                <div class="price">KSh ${flight.price.toLocaleString()}</div>
                                <small>${flight.AvailableSeats} seats left</small>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-book" onclick="openBookingModal(${flight.FlightID})">
                                    Book Now
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('results').style.display = 'block';
        }
        
        function openBookingModal(flightId) {
            document.getElementById('selectedFlightId').value = flightId;
            new bootstrap.Modal(document.getElementById('bookingModal')).show();
        }
        
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('createbooking', '1');
            formData.append('flightId', document.getElementById('selectedFlightId').value);
            formData.append('passengerName', document.getElementById('passengerName').value);
            formData.append('passengerEmail', document.getElementById('passengerEmail').value);
            formData.append('passengerPhone', document.getElementById('passengerPhone').value);
            formData.append('passportNo', document.getElementById('passportNo').value);
            formData.append('seatNumber', document.getElementById('seatNumber').value);
            
            try {
                const response = await fetch('controllers/flightoperations.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    alert('✓ Booking confirmed successfully!');
                    location.reload();
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                alert('Booking failed. Please try again.');
            }
        });
        
        function viewBookings() {
            alert('Booking history feature coming soon!');
        }
        
        // Initialize
        loadCities();
    </script>
</body>
</html>
